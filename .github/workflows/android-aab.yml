name: Android AAB

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android-aab:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Setup Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      # 4) Dipendenze
      - name: Flutter Pub Get
        run: flutter pub get

      # 5) Setup Android SDK
      - name: Setup Android SDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5.5) Debug keystore (firma di test in CI)
      - name: Prepare Android debug keystore
        run: |
          echo "ANDROID_SDK_HOME=$HOME" >> $GITHUB_ENV
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000
          fi

      # 6) Build AAB (tollerante agli errori di path)
      - name: Build AAB
        run: |
          set +e
          flutter build appbundle --release || true
          set -e

      # 7) Elenca tutte le cartelle output
      - name: List outputs
        run: |
          echo "== build/app/outputs =="
          ls -R build/app/outputs || true
          echo "== android/app/build/outputs =="
          ls -R android/app/build/outputs || true

      # 8) Carica qualunque AAB trovato
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: |
            build/app/outputs/**/*.aab
            android/app/build/outputs/**/*.aab
          if-no-files-found: error
