name: Android AAB

on:
  workflow_dispatch:

jobs:
  build-android-aab:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 21 (compatibile con librerie moderne/Jetifier)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # 3) Flutter 3.35.4 (Dart 3.9)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      # 4) Dipendenze Dart/Flutter
      - name: Flutter pub get
        run: flutter pub get

      # 5) Android SDK + licenze
      - name: Accept licenses & install SDKs
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;25.1.8937393"

      # 5.5) Keystore debug (solo per build di test in CI; per Play servirà keystore release)
      - name: Prepare Android debug keystore
        run: |
          echo "ANDROID_SDK_HOME=$HOME" >> $GITHUB_ENV
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000
          fi

      # 6) Build AAB (bypassa i check di versione AGP/Gradle se rumorosi)
      - name: Build AAB
        run: |
          flutter doctor -v
          flutter build appbundle --release --android-skip-build-dependency-validation

      # 7) Lista degli output (debug visivo)
      - name: List outputs
        run: |
          echo "== tree build =="
          find build -maxdepth 6 -type d -print || true
          echo "== AABs trovati =="
          find . -maxdepth 8 -type f -name "*.aab" -print || true

      # 8) Localizza il primo AAB prodotto
      - name: Locate AAB
        id: locate
        run: |
          AAB=$(find build -type f -name "*.aab" | head -n 1 || true)
          if [ -z "$AAB" ]; then
            AAB=$(find android -type f -name "*.aab" | head -n 1 || true)
          fi
          if [ -z "$AAB" ]; then
            echo "::error::No AAB found after build"
            exit 1
          fi
          echo "👉 AAB: $AAB"
          echo "aab=$AAB" >> $GITHUB_OUTPUT

      # 9) Carica l’AAB come artefatto scaricabile
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: ${{ steps.locate.outputs.aab }}
          if-no-files-found: error
