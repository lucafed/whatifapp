name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Set up Flutter (pin exact version)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"   # <— versione stabile esplicita
          cache: true

      - name: Flutter doctor (info)
        run: flutter doctor -v

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (release)
        shell: bash
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "No OPENAI_API_KEY secret -> building without dart-define"
            flutter build apk --release
          else
            echo "OPENAI_API_KEY detected -> passing dart-define"
            flutter build apk --release --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: whatf-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk

