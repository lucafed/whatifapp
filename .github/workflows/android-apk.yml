name: Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Flutter (Dart >= 3.9)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      # 4) Dipendenze Dart/Flutter
      - name: Flutter Pub Get
        run: flutter pub get

      # 5) Android SDK + licenze
      - name: Setup Android SDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5.5) Keystore debug (usiamo signing debug per la release di test in CI)
      - name: Prepare Android debug keystore
        run: |
          echo "ANDROID_SDK_HOME=$HOME" >> $GITHUB_ENV
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000
          fi

      # 6) Build APK con Gradle (più robusto con i nuovi plugin)
      - name: Build APK (Gradle)
        working-directory: android
        run: |
          ./gradlew --version
          ./gradlew clean :app:assembleRelease -x lint

      # 7) Debug: lista file prodotti
      - name: List outputs
        run: |
          echo "== OUTPUTS (flutter-apk) =="
          ls -R build/app/outputs/flutter-apk || true
          echo "== OUTPUTS (gradle apk) =="
          ls -R android/app/build/outputs/apk || true

      # 8) Carica qualsiasi APK trovato (gradle o flutter)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: |
            build/app/outputs/flutter-apk/*.apk
            android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
