name: Android APK
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Flutter 3.35.4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # SDK + licenze (strumenti basilari)
      - name: Android SDK components
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # Keystore debug per firmare la release in CI
      - name: Prepare debug keystore
        run: |
          echo "ANDROID_SDK_HOME=$HOME" >> $GITHUB_ENV
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000
          fi

      # Build APK (evita blocchi sui check di versioni)
      - name: Build APK
        run: |
          flutter build apk --release --android-skip-build-dependency-validation

      # Debug: elenca dove sta l’APK
      - name: List outputs
        run: |
          echo "== tree build =="
          find build -maxdepth 6 -type d -print || true
          echo "== APKs =="
          find . -maxdepth 8 -type f -name "*.apk" -print || true

      # Localizza il primo APK e lo esporta come artefatto
      - name: Locate APK
        id: locate
        run: |
          APK=$(find build -type f -name "*.apk" | head -n 1 || true)
          if [ -z "$APK" ]; then
            APK=$(find android -type f -name "*.apk" | head -n 1 || true)
          fi
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "👉 APK: $APK"
          echo "apk=$APK" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error
