name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # Codice
      - name: Checkout
        uses: actions/checkout@v4

      # Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Licenze + pacchetti (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -e
          SM="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SM" ]; then SM="sdkmanager"; fi
          yes | $SM --licenses >/dev/null 2>&1 || true
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # Flutter pin
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # Build APK (auto-rileva il flavor, se presente)
      - name: Build APK (release, auto-flavor)
        shell: bash
        run: |
          set -e
          # Estrai il PRIMO flavor, se esiste, dal blocco productFlavors di build.gradle
          FLAVOR=$(awk '/productFlavors[[:space:]]*{/{flag=1;next}/}/{if(flag){exit}}flag' android/app/build.gradle \
            | grep -E '^[[:space:]]*[A-Za-z0-9_]+[[:space:]]*{' \
            | head -n1 \
            | sed -E 's/[[:space:]]*\\{.*$//' \
            | tr -d '[:space:]')

          echo "Flavor rilevato: ${FLAVOR:-<nessuno>}"

          if [ -z "$FLAVOR" ]; then
            # Nessun flavor: build normale
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release
            else
              flutter build apk --release --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          else
            # Flavor presente: build con --flavor <nome>
            # Nota: se il tuo entrypoint non è lib/main.dart, cambia -t di conseguenza.
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release --flavor "$FLAVOR" -t lib/main.dart
            else
              flutter build apk --release --flavor "$FLAVOR" -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          fi

      # Artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

