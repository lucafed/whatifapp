name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4) Licenze + pacchetti (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -e
          SM="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SM" ]; then SM="sdkmanager"; fi
          yes | $SM --licenses >/dev/null 2>&1 || true
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5) Flutter stabile
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # 6) Build “smart”: senza flavor -> se fallisce, rileva MODULO + FLAVOR con Gradle
      - name: Build APK (smart module & flavor detection)
        shell: bash
        run: |
          set -e

          build_no_flavor() {
            echo ">>> [Build] SENZA flavor (entrypoint: lib/main.dart)"
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release -t lib/main.dart
            else
              flutter build apk --release -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          }

          build_with_flavor() {
            local FL="$1"
            echo ">>> [Build] Con flavor: $FL (entrypoint: lib/main.dart)"
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release --flavor "$FL" -t lib/main.dart
            else
              flutter build apk --release --flavor "$FL" -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          }

          # 1) Prova build senza flavor
          set +e
          build_no_flavor
          STATUS=$?
          set -e
          if [ $STATUS -eq 0 ]; then
            echo ">>> Build senza flavor riuscita"
            exit 0
          fi

          echo ">>> Build senza flavor fallita. Rilevo MODULO e FLAVORS con Gradle..."

          # 2) Scopri il modulo corretto con Gradle
          pushd android >/dev/null
          chmod +x ./gradlew

          # Elenca i progetti Gradle e prendi il PRIMO subproject (diverso dal root)
          MODULE=$(./gradlew -q projects \
            | sed -n "s/^Project '\\(.*\\)'.*/\\1/p" \
            | grep -v "^Root project 'android'$" \
            | head -n1)

          if [ -z "$MODULE" ]; then
            echo ">>> Nessun subproject trovato da Gradle. Provo a usare ':app' come default."
            MODULE="app"
          fi

          echo ">>> Modulo rilevato: $MODULE"

          # 3) Trova flavors (task assemble*Release) per quel modulo
          FLAVORS=$(
            ./gradlew -q ":${MODULE}:tasks" --all \
              | sed -n 's/.*assemble\([A-Za-z0-9]\+\)Release.*/\1/p' \
              | sort -u \
              | tr '[:upper:]' '[:lower:]'
          )

          popd >/dev/null
          echo ">>> Flavors rilevati: ${FLAVORS:-<nessuno>}"

          # 4) Se NON ci sono flavors, riprova una build release “semplice” (Flutter gestisce il modulo internamente)
          if [ -z "$FLAVORS" ]; then
            echo ">>> Nessun flavor trovato. Riprovo una build release semplice."
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release -t lib/main.dart
            else
              flutter build apk --release -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
            exit 0
          fi

          # 5) Prova tutti i flavors
          for F in $FLAVORS; do
            set +e
            build_with_flavor "$F"
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo ">>> Build riuscita con flavor: $F"
              exit 0
            fi
            echo ">>> Build fallita con flavor: $F. Provo il prossimo (se presente)..."
          done

          echo ">>> Nessun flavor ha prodotto una build valida."
          exit 1

      # 7) Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
