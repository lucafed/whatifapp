name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java (Gradle richiede JDK 17)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3) Android SDK (ambiente base)
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # 4) Pacchetti Android + licenze (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -u
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          # sdkmanager è in PATH, ma usiamo il percorso esplicito per sicurezza
          if [ -x "$SDKMANAGER" ]; then
            SM="$SDKMANAGER"
          else
            SM="sdkmanager"
          fi

          # Accetta licenze: ignora 'broken pipe' se sdkmanager chiude prima lo stream
          yes | $SM --licenses >/dev/null 2>&1 || true

          # Installa i pacchetti necessari
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5) Flutter (versione pin esplicita)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      # 6) Info + dipendenze
      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # 7) Build APK (con o senza chiave OPENAI)
      - name: Build APK (release)
        shell: bash
        run: |
          if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "No OPENAI_API_KEY -> building without dart-define"
            flutter build apk --release
          else
            echo "OPENAI_API_KEY found -> passing dart-define"
            flutter build apk --release --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          fi

      # 8) Upload artifact (v4)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: whatf-app-apk
          path: build/app/outputs/flutter-apk/app-release.apk
