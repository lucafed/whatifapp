name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 17 per Gradle/Android
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Android SDK (ambiente base)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4) Licenze + pacchetti (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -e
          SM="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SM" ]; then SM="sdkmanager"; fi
          yes | $SM --licenses >/dev/null 2>&1 || true
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5) Flutter (versione pin stabile)
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      # 6) Dipendenze
      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # 7) Build APK release (auto-detect flavor)
      - name: Build APK (release, auto-flavor)
        shell: bash
        run: |
          set -e

          # Estrai il PRIMO flavor (se esiste) dal blocco productFlavors in android/app/build.gradle
          FLAVOR=$(awk '
            /productFlavors[[:space:]]*{/ {inblock=1; next}
            inblock && /}/ {exit}
            inblock && match($0,/^[[:space:]]*([A-Za-z0-9_]+)[[:space:]]*{/,m) {print m[1]; exit}
          ' android/app/build.gradle)

          echo "Flavor rilevato: ${FLAVOR:-<nessuno>}"

          # Entry point (cambia se usi un main diverso)
          ENTRYPOINT="lib/main.dart"

          if [ -z "$FLAVOR" ]; then
            # Nessun flavor
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release -t "$ENTRYPOINT"
            else
              flutter build apk --release -t "$ENTRYPOINT" \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          else
            # Con flavor
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release --flavor "$FLAVOR" -t "$ENTRYPOINT"
            else
              flutter build apk --release --flavor "$FLAVOR" -t "$ENTRYPOINT" \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          fi

      # 8) Carica l'APK come artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
