name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4) Licenze + pacchetti (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -e
          SM="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SM" ]; then SM="sdkmanager"; fi
          yes | $SM --licenses >/dev/null 2>&1 || true
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5) Flutter stabile
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # 6) Build “smart”: senza flavor -> se fallisce, rileva flavors da Gradle e riprova
      - name: Build APK (smart flavor detection)
        shell: bash
        run: |
          set -e

          build_no_flavor() {
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release -t lib/main.dart
            else
              flutter build apk --release -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          }

          build_with_flavor() {
            local FL="$1"
            echo ">>> Provo con flavor: $FL"
            if [ -z "${{ secrets.OPENAI_API_KEY }}" ]; then
              flutter build apk --release --flavor "$FL" -t lib/main.dart
            else
              flutter build apk --release --flavor "$FL" -t lib/main.dart \
                --dart-define=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            fi
          }

          echo ">>> [1/2] Provo build SENZA flavor"
          set +e
          build_no_flavor
          STATUS=$?
          set -e

          if [ $STATUS -eq 0 ]; then
            echo ">>> Build senza flavor riuscita"
            exit 0
          fi

          echo ">>> Build senza flavor fallita. Provo a rilevare i flavors da Gradle…"

          # Estrapola i flavors dai task assemble*Release
          pushd android >/dev/null
          chmod +x ./gradlew
          FLAVORS=$(
            ./gradlew -q :app:tasks --all \
              | sed -n 's/.*assemble\([A-Za-z0-9]\+\)Release.*/\1/p' \
              | sort -u \
              | tr '[:upper:]' '[:lower:]'
          )
          popd >/dev/null

          echo ">>> Flavors rilevati (da Gradle): ${FLAVORS:-<nessuno>}"

          if [ -z "$FLAVORS" ]; then
            echo "Nessun flavor trovato da Gradle ma build senza flavor fallita."
            echo "Controlla android/app/build.gradle (productFlavors) o dimmi il flavor da usare."
            exit 1
          fi

          # Prova tutti i flavors
          for F in $FLAVORS; do
            set +e
            build_with_flavor "$F"
            STATUS=$?
            set -e
            if [ $STATUS -eq 0 ]; then
              echo ">>> Build riuscita con flavor: $F"
              exit 0
            fi
          done

          echo ">>> Nessun flavor ha prodotto una build valida."
          exit 1

      # 7) Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
