name: Android APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 17 (richiesto da AGP)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Flutter 3.35.4
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      # 4) Dipendenze Dart
      - name: Flutter pub get
        run: flutter pub get

      # 5) Android SDK + licenze (piattaforme più usate)
      - name: Accept licenses & install SDKs
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmake;3.22.1" \
            "ndk;25.1.8937393"

      # 6) Compila APK (flag per bypassare i controlli di versione AGP/Gradle)
      - name: Build APK
        run: |
          flutter doctor -v
          flutter build apk --release --android-skip-build-dependency-validation

      # 7) Elenca tutto ciò che ha prodotto (debug visivo)
      - name: List outputs
        run: |
          echo "== tree build (max depth) =="
          find build -maxdepth 6 -type d -print || true
          echo "== APKs trovati =="
          find . -maxdepth 6 -type f -name "*.apk" -print || true

      # 8) Trova il primo APK valido e lo espone come output
      - name: Locate APK
        id: locate
        run: |
          APK=$(find build -type f -name "*.apk" | head -n 1 || true)
          if [ -z "$APK" ]; then
            APK=$(find android -type f -name "*.apk" | head -n 1 || true)
          fi
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "👉 APK: $APK"
          echo "apk=$APK" >> $GITHUB_OUTPUT

      # 9) Carica l’APK effettivo
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error
