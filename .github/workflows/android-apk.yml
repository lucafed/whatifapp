name: Android APK
on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Flutter 3.35.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.35.4"
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      - name: Android SDK components
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --licenses || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Prepare debug keystore
        run: |
          echo "ANDROID_SDK_HOME=$HOME" >> $GITHUB_ENV
          mkdir -p "$HOME/.android"
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            keytool -genkey -v \
              -keystore "$HOME/.android/debug.keystore" \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -dname "CN=Android Debug,O=Android,C=US" \
              -keyalg RSA -keysize 2048 -validity 10000
          fi

      # 1) Tentativo con Flutter
      - name: Build with Flutter
        id: flutter_build
        continue-on-error: true
        run: |
          set -eux
          flutter build apk --release --android-skip-build-dependency-validation

      # 2) Se Flutter non ha prodotto un APK dove si aspetta, usa Gradle nativo
      - name: Fallback build with Gradle
        if: steps.flutter_build.outcome != 'success'
        run: |
          set -eux
          cd android
          ./gradlew --version
          ./gradlew :app:assembleRelease --stacktrace --no-daemon
          cd ..

      # 3) Elenca tutto per debug
      - name: List potential outputs
        run: |
          echo "== find *.apk =="
          find . -type f -name "*.apk" -print || true
          echo "== tree outputs (short) =="
          find build -maxdepth 6 -type d -print || true
          find android/app/build -maxdepth 6 -type d -print || true

      # 4) Localizza l’APK nei percorsi più comuni
      - name: Locate APK
        id: locate
        run: |
          set -e
          CANDIDATES=$(
            printf "%s\n" \
              "build/app/outputs/flutter-apk/app-release.apk" \
              "build/app/outputs/flutter-apk/*release*.apk" \
              "android/app/build/outputs/apk/release/app-release.apk" \
              "android/app/build/outputs/apk/release/*.apk" \
              "android/app/build/outputs/flutter-apk/*release*.apk"
          )
          APK=""
          for p in $CANDIDATES; do
            FOUND=$(ls -1 $p 2>/dev/null | head -n 1 || true)
            if [ -n "$FOUND" ]; then
              APK="$FOUND"
              break
            fi
          done
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "apk=$APK" >> $GITHUB_OUTPUT
          echo "Found APK at: $APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ${{ steps.locate.outputs.apk }}
          if-no-files-found: error
