name: Android APK (no-flavor, verbose)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      # 1) Codice
      - name: Checkout
        uses: actions/checkout@v4

      # 2) Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # 3) Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 4) Licenze + pacchetti (tollerante a "broken pipe")
      - name: Install Android packages
        shell: bash
        run: |
          set -e
          SM="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SM" ]; then SM="sdkmanager"; fi
          yes | $SM --licenses >/dev/null 2>&1 || true
          $SM "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 5) Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.24.0"
          cache: true

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Pub get
        run: flutter pub get

      # 6) Build release SENZA flavor + log verbose
      - name: Build APK (release, no-flavor, verbose)
        shell: bash
        run: |
          set -e
          # Se il tuo entrypoint non è lib/main.dart, cambia qui:
          ENTRYPOINT="lib/main.dart"

          # Build verbose. tee salva il log su file.
          set +e
          flutter build apk --release -t "$ENTRYPOINT" -v | tee build-verbose.log
          STATUS=${PIPESTATUS[0]}
          set -e

          # Salva log sempre (anche se fallisce)
          mkdir -p build_logs
          mv build-verbose.log build_logs/build-verbose.log || true

          # Esci con lo stesso exit code
          exit $STATUS

      # 7) Carica APK se presente
      - name: Upload APK (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: warn

      # 8) Carica SEMPRE i log della build
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build_logs/
          if-no-files-found: ignore
