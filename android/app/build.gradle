
plugins {
  id "com.android.application"
  id "kotlin-android"
  id "dev.flutter.flutter-gradle-plugin"
}
android {
  namespace "com.whatf.app"
  compileSdk 34
  defaultConfig {
    applicationId "com.whatf.app"
    minSdk 23
    targetSdk 34
    versionCode 2
    versionName "1.1.0"
  }
  buildTypes {
    release {
      minifyEnabled true
      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
    }
  }
}
flutter { source '../..' }
