plugins {
  id "com.android.application"
  id "org.jetbrains.kotlin.android"
  id "dev.flutter.flutter-gradle-plugin"
}

android {
  namespace "com.whatifapp"
  compileSdk 36

  defaultConfig {
    applicationId "com.whatifapp"
    minSdkVersion 21
    targetSdkVersion 36
    versionCode 2
    versionName "1.0"
  }

  buildTypes {
    release {
      // Per ora senza minify per evitare rimozioni aggressive
      minifyEnabled false
      shrinkResources false
      // In CI usiamo keystore debug generato dal workflow
      signingConfig signingConfigs.debug
    }
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_17
    targetCompatibility JavaVersion.VERSION_17
  }
  kotlinOptions {
    jvmTarget = "17"
  }
}

dependencies {
  implementation "org.jetbrains.kotlin:kotlin-stdlib:2.0.21"
}
