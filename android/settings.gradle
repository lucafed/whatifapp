pluginManagement {
    def localProperties = new Properties()
    def localPropertiesFile = new File(rootDir, "local.properties")
    if (localPropertiesFile.exists()) {
        localPropertiesFile.withInputStream { stream -> localProperties.load(stream) }
    }
    def flutterSdkPath = localProperties.getProperty("flutter.sdk")
    if (flutterSdkPath == null) {
        throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties")
    }
    includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    // Loader del plugin flutter (fornito da flutter_tools)
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    // Plugin Android/Kotlin (versioni allineate all’AGP e Kotlin che stiamo usando)
    id "com.android.application" version "8.2.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.22" apply false
}

include ":app"
