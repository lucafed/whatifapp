pluginManagement {
  def localProps = new Properties()
  def localPropsFile = new File(rootDir, "local.properties")
  if (localPropsFile.exists()) {
    localPropsFile.withInputStream { stream -> localProps.load(stream) }
  }
  def flutterSdkPath = localProps.getProperty("flutter.sdk")
  if (flutterSdkPath == null) {
    throw new GradleException("Flutter SDK not found. Define flutter.sdk in local.properties")
  }
  includeBuild("${flutterSdkPath}/packages/flutter_tools/gradle")

  repositories {
    google()
    mavenCentral()
    gradlePluginPortal()
  }
}

plugins {
  id "dev.flutter.flutter-plugin-loader" version "1.0.0"
  id "com.android.application" version "8.6.1" apply false
  id "org.jetbrains.kotlin.android" version "2.0.21" apply false
}

include(":app")
